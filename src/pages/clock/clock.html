<!DOCTYPE html>
<html>
  <head>
    <title>clock</title>
    <link rel="stylesheet" type="" href="./clock.css">
  </head>
  <body>
    <header>

    </header>
    <div class ="display">
      <div class="holder">

      <canvas id="canvas"></canvas>  
      </div>
    </div>
    <div class="container">
<h1>Pomodoro:</h1>
 <div  class="deceny inp_field">
        <input type="number" id="hour_inp" name="hh" min="0" placeholder ="hh"  max="60" default ="0">
        <input type="number" id ="min_inp" name="mm" min="0" max="60" placeholder ="mm"default ="0">
        <input type="number" id ="sec_inp" name="ss" min="0" max="60" maxlengh="2" placeholder ="ss" default="0"><br>

    </div>

<h1>Short break:</h1>
      <div class="deceny inp_field">
       <input type="number" id="s_hour_inp" name="hh" min="0" placeholder ="hh" max="60" default ="0">
        <input type="number" id ="s_min_inp" name="mm" min="0" max="60" placeholder ="mm" default ="0">
        <input type="number" id ="s_sec_inp" name="ss" min="0" max="60" maxlengh="2" placeholder ="ss" default="0"><br>
</div>
     <h1>Long Break:</h1> 
      <div class="deceny inp_field">
         <input type="number" id="l_hour_inp" name="hh" min="0" placeholder ="hh" max="60" default ="0">
        <input type="number" id ="l_min_inp" name="mm" min="0" max="60" placeholder ="mm" default ="0">

        <input type="number" id ="l_sec_inp" name="ss" min="0" max="60" maxlengh="2" placeholder ="ss" default="0"><br>
</div>

    
      <div class="deceny">
<button id="save">save changes</button>

      </div> 


    </div>

    <script type= "module" src="./clock.js">
    </script>
  </body> 
  <footer>

  </footer>


</html>
